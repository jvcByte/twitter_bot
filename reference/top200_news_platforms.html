const CATS = [
  {key:"all",label:"All 200"},
  {key:"tech",label:"Tech"},
  {key:"cyber",label:"Cybersecurity"},
  {key:"world",label:"World News"},
  {key:"biz",label:"Business"},
  {key:"env",label:"Environment"},
  {key:"sci",label:"Science"},
  {key:"africa",label:"Africa"},
  {key:"health",label:"Health"},
  {key:"space",label:"Space"},
];

const BADGE_LABEL = {tech:"Tech",cyber:"Cyber",world:"World",biz:"Business",env:"Environment",sci:"Science",africa:"Africa",health:"Health",space:"Space",media:"Media"};
const PER_PAGE = 30;
let activeCat = "all", page = 0, filtered = [];

function getFiltered() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  return ALL.filter(p => {
    const mc = activeCat === "all" || p.cat === activeCat;
    const mq = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q) || p.tags.some(t => t.toLowerCase().includes(q));
    return mc && mq;
  });
}

function renderFilters() {
  const el = document.getElementById("filters");
  el.innerHTML = "";
  CATS.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "chip" + (c.key === activeCat ? " active" : "");
    btn.textContent = c.label;
    btn.onclick = () => { activeCat = c.key; page = 0; render(); };
    el.appendChild(btn);
  });
}

function renderGrid(data) {
  const start = page * PER_PAGE, slice = data.slice(start, start + PER_PAGE);
  document.getElementById("count").textContent = data.length + " platform" + (data.length !== 1 ? "s" : "") + (data.length > PER_PAGE ? " — showing " + (start+1) + "–" + Math.min(start+PER_PAGE, data.length) : "");
  if (!slice.length) { document.getElementById("grid").innerHTML = '<div class="empty">No platforms match your search.</div>'; document.getElementById("pagination").innerHTML = ""; return; }
  document.getElementById("grid").innerHTML = slice.map(p => `
    <div class="card">
      <div class="card-top">
        <div><span class="card-num">#${p.n}</span><span class="card-name"> ${p.name}</span></div>
        <span class="badge badge-${p.cat}">${BADGE_LABEL[p.cat]||p.cat}</span>
      </div>
      <div class="card-desc">${p.desc}</div>
      <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      <a class="card-link" href="https://${p.url}" target="_blank">${p.url}</a>
    </div>`).join("");
  renderPagination(data.length);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PER_PAGE);
  if (pages <= 1) { document.getElementById("pagination").innerHTML = ""; return; }
  let html = "";
  if (page > 0) html += `<button class="page-btn" onclick="goPage(${page-1})">← Prev</button>`;
  for (let i = 0; i < pages; i++) html += `<button class="page-btn${i===page?" active":""}" onclick="goPage(${i})">${i+1}</button>`;
  if (page < pages-1) html += `<button class="page-btn" onclick="goPage(${page+1})">Next →</button>`;
  document.getElementById("pagination").innerHTML = html;
}

function goPage(p) { page = p; filtered = getFiltered(); renderGrid(filtered); window.scrollTo(0,0); }
function onSearch() { page = 0; render(); }

function render() {
  renderFilters();
  filtered = getFiltered();
  renderGrid(filtered);
}

render();
</script>
