name: Post Tweet

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours (4x/day)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Install Google Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb
          sudo apt-get install -f -y
          google-chrome --version

      - name: Download dependencies
        run: go mod download

      - name: Run bot
        env:
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          IMGFLIP_USERNAME: ${{ secrets.IMGFLIP_USERNAME }}
          IMGFLIP_PASSWORD: ${{ secrets.IMGFLIP_PASSWORD }}
          POST_MODE: ${{ vars.POST_MODE }}
          FEEDS_FILE: data/ai_security_feeds.json
          CATEGORY: ${{ vars.CATEGORY || 'all'}}
          MAX_ARTICLE_AGE_HOURS: ${{ vars.MAX_ARTICLE_AGE_HOURS }}
          TWEET_DELAY_SECONDS: ${{ vars.TWEET_DELAY_SECONDS }}
          MAX_TWEETS_PER_RUN: ${{ vars.MAX_TWEETS_PER_RUN }}
          RUN_ONCE: "true"
        run: go run ./cmd/bot/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: "*.png"
          if-no-files-found: ignore

      - name: Commit state files
        if: always()
        run: |
          git config user.name "jvcByte"
          git config user.email "jvc8463@gmail.com"
          git add data/seen_articles.json data/rotation_state.json data/seen_creator.json
          git diff --staged --quiet || git commit -m "chore: update bot state [skip ci]"
          git push
