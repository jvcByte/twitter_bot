const CATS=[
  {k:"all",l:"All"},
  {k:"world",l:"World"},
  {k:"tech",l:"Tech"},
  {k:"cyber",l:"Cybersecurity"},
  {k:"env",l:"Environment"},
  {k:"biz",l:"Business"},
  {k:"sci",l:"Science"},
  {k:"start",l:"Startups"},
  {k:"health",l:"Health"},
  {k:"agg",l:"Aggregators"},
];
const BL={world:"b-world",tech:"b-tech",cyber:"b-cyber",env:"b-env",biz:"b-biz",sci:"b-sci",start:"b-start",health:"b-health",agg:"b-agg"};
const BN={world:"World",tech:"Tech",cyber:"Cyber",env:"Environment",biz:"Business",sci:"Science",start:"Startups",health:"Health",agg:"Aggregator"};
const PER=24;
let cat="all",pg=0;

function getFilt(){
  const q=document.getElementById("q").value.toLowerCase().trim();
  return D.filter(p=>{
    const mc=cat==="all"||p.cat===cat;
    const mq=!q||p.name.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)||p.tags.some(t=>t.toLowerCase().includes(q));
    return mc&&mq;
  });
}

function renderFilters(){
  const el=document.getElementById("fbar");el.innerHTML="";
  CATS.forEach(c=>{
    const b=document.createElement("button");
    b.className="chip"+(c.k===cat?" on":"");
    const cnt=c.k==="all"?D.length:D.filter(p=>p.cat===c.k).length;
    b.textContent=c.l+" ("+cnt+")";
    b.onclick=()=>{cat=c.k;pg=0;go();};
    el.appendChild(b);
  });
}

function go(){
  renderFilters();
  const f=getFilt();
  const s=pg*PER,sl=f.slice(s,s+PER);
  document.getElementById("cnt").textContent=f.length+" unique platform"+(f.length!==1?"s":"")+(f.length>PER?" — showing "+(s+1)+"–"+Math.min(s+PER,f.length):"");
  document.getElementById("stat").textContent=D.length+" total (dupes removed)";
  if(!sl.length){document.getElementById("grid").innerHTML='<div class="empty">No platforms found.</div>';document.getElementById("pager").innerHTML="";return;}
  document.getElementById("grid").innerHTML=sl.map(p=>`
    <div class="card">
      <div class="ct"><div class="cn">${p.name}</div><span class="badge ${BL[p.cat]||"b-agg"}">${BN[p.cat]||p.cat}</span></div>
      <div class="cd">${p.desc}</div>
      <div class="tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div>
      <a class="cl" href="https://${p.url}" target="_blank">${p.url}</a>
    </div>`).join("");
  const pages=Math.ceil(f.length/PER);
  let ph="";
  if(pages>1){
    if(pg>0)ph+=`<button class="pb" onclick="goPg(${pg-1})">← Prev</button>`;
    for(let i=0;i<pages;i++)ph+=`<button class="pb${i===pg?" on":""}" onclick="goPg(${i})">${i+1}</button>`;
    if(pg<pages-1)ph+=`<button class="pb" onclick="goPg(${pg+1})">Next →</button>`;
  }
  document.getElementById("pager").innerHTML=ph;
}
function goPg(p){pg=p;go();window.scrollTo(0,0);}
go();
</script>
